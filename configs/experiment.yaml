run_name: "pilot_7x7_v1"

paths:
  accepted_dir: "data/accepted"
  rejected_dir: "data/rejected"
  summaries_dir: "data/summaries"
  logs_dir: "logs"

generation:
  accepted_per_cell: 10
  max_retries_per_dataset: 7
  max_total_attempts_per_cell: 84
  # Base seed for deterministic per-cell, per-target execution seed derivation.
  dataset_seed_start: 11

execution:
  timeout_seconds: 300


cell_selection:
  mode: "all"
